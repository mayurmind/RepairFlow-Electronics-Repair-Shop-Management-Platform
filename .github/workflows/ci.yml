name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: repairflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d repairflow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 11.0.0

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build internal packages
      run: pnpm build:packages

    - name: Generate Prisma Client
      env:
        DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/repairflow_test?schema=public
      run: pnpm --filter api exec prisma generate

    - name: Validate Prisma schema
      env:
        DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/repairflow_test?schema=public
      run: pnpm --filter api exec prisma validate

    - name: Apply API test migrations
      env:
        DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/repairflow_test?schema=public
      run: pnpm --filter api exec prisma migrate deploy

    - name: Lint
      run: pnpm lint

    - name: Test API
      env:
        DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/repairflow_test?schema=public
      run: pnpm --filter api test:ci

    - name: Test API E2E
      env:
        DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/repairflow_test?schema=public
      run: pnpm --filter api test:e2e

    - name: Test Web
      run: pnpm --filter web test

    - name: Build applications
      env:
        DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/repairflow_test?schema=public
        NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1
      run: pnpm build:apps

  e2e-tests:
    name: E2E Tests
    needs: build-and-test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: repairflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d repairflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/repairflow?schema=public
      WEB_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api/v1
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      JWT_ACCESS_SECRET: ci_secure_access_secret_for_repairflow_testing_123456789
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      COOKIE_SECURE: "false"
      COOKIE_SAME_SITE: lax
      LOG_LEVEL: info

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build internal packages
        run: pnpm build:packages

      - name: Generate Prisma Client
        run: pnpm --filter api exec prisma generate

      - name: Validate Prisma schema
        run: pnpm --filter api exec prisma validate

      - name: Run Prisma migrations
        run: pnpm --filter api exec prisma migrate deploy

      - name: Seed test database
        run: pnpm --filter api exec prisma db seed

      - name: Build applications
        env:
          NODE_ENV: production
        run: pnpm build:apps

      - name: Start API and Web
        run: |
          pnpm --filter api start:prod > api.log 2>&1 &
          pnpm --filter web start > web.log 2>&1 &

      - name: Wait for API to be ready
        run: |
          echo "Waiting for API to start..."
          for i in {1..30}; do
            if curl --fail --silent http://localhost:4000/api/v1/health; then
              echo "API is ready!"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to become ready after 60 seconds."
          echo "=== API Logs ==="
          cat api.log || echo "No API logs found."
          exit 1

      - name: Install Playwright Chromium
        run: pnpm --filter e2e exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter e2e test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/e2e/test-results/
          if-no-files-found: ignore
          retention-days: 7
