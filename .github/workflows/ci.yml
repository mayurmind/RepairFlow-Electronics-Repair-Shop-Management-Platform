name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 11.0.0

    - name: Install Dependencies
      run: pnpm config set ignore-scripts false && pnpm install --frozen-lockfile

    - name: Lint
      run: pnpm run lint

    - name: Test API
      run: pnpm --filter api test -- --runInBand

    - name: Test Web
      run: pnpm --filter web test

    - name: Build
      run: pnpm run build

    - name: Validate Prisma
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/repairflow
      run: pnpm --filter api exec prisma validate
