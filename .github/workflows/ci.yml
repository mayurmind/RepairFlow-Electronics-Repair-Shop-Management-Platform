name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 11.0.0

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Lint
      run: pnpm run lint

    - name: Test API
      run: pnpm --filter api test -- --runInBand

    - name: Test Web
      run: pnpm --filter web test

    - name: Build
      run: pnpm run build

    - name: Validate Prisma Schema
      run: pnpm --filter api exec prisma validate

  e2e-tests:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: repairflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 11.0.0

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Compile config packages
      run: |
        pnpm --filter @repairflow/typescript-config build
        pnpm --filter @repairflow/shared-types build
        pnpm --filter @repairflow/validation build

    - name: Setup env file
      run: |
        cp .env.example .env
        sed -i 's|DATABASE_URL=.*|DATABASE_URL=postgresql://postgres:postgrespassword@localhost:5432/repairflow?schema=public|' .env
        sed -i 's|COOKIE_SECURE=.*|COOKIE_SECURE=false|' .env

    - name: Run Prisma Migrations
      env:
        DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/repairflow?schema=public
      run: pnpm --filter api exec prisma migrate deploy

    - name: Seed Database
      env:
        DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/repairflow?schema=public
      run: pnpm --filter api exec prisma db seed

    - name: Install Playwright Browsers
      run: pnpm --filter e2e exec playwright install --with-deps

    - name: Run E2E Tests
      env:
        DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/repairflow?schema=public
        JWT_ACCESS_SECRET: dev_jwt_access_secret_key_which_must_be_very_long_and_secure_12345
        COOKIE_SECURE: false
      run: pnpm --filter e2e test
